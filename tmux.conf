# Enable mouse: click to focus, drag to resize, scroll history.
set -g mouse on

# Large scrollback for agent logs and command output.  
set -g history-limit 200000

# 2x2 agent layout in a new window.
bind 4 {
  new-window -n agents -c "#{pane_current_path}"
  split-window -h -c "#{pane_current_path}"
  select-pane -L
  split-window -v -c "#{pane_current_path}"
  select-pane -R
  split-window -v -c "#{pane_current_path}"
  select-layout tiled
}